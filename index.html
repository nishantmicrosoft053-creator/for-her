<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Loading -->

<div id="loader">

<h1>❤️</h1>

<p>Someone made this just for you...</p>

<button id="startBtn">
Tap To Open ✨
</button>

</div>

<!-- Hearts -->

<div id="hearts"></div>

<!-- Background -->

<div class="bg"></div>

<!-- Slideshow -->

<div class="slideshow">

<img src="photo1.jpg" class="slide active">

<img src="photo2.jpg" class="slide">

<img src="photo3.jpg" class="slide">

</div>

<!-- Overlay -->

<div class="overlay"></div>

<!-- Main -->

<div class="content">

<h3 class="small">
For Someone Special 🌸
</h3>

<h1 id="title">
...
</h1>

<p id="typing"></p>

<button id="letterBtn">
Open Letter 💌
</button>

</div>

<!-- Letter -->

<div id="popup">

<div class="box">

<h2>❤️</h2>

<p>

Maybe you'll never know...

But every time I see you,

my day becomes a little brighter.

Your smile is enough

to make ordinary moments feel special.

Stay happy.

Always.

🌸

</p>

<button id="close">

Close

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
